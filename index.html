<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>Samaya - Smart AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Tapai ko purano futuristic CSS yaha hunchha */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
    body { margin: 0; background: radial-gradient(circle at center, #000a1a, #000014); color: #00f0f0; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff88; border-radius: 15px; width: 95vw; max-width: 500px; padding: 20px; box-shadow: 0 0 30px #00ffffaa; display: flex; flex-direction: column; align-items: center; }
    .ai-image { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #00ffff; box-shadow: 0 0 20px #00ffff; margin-bottom: 10px; overflow: hidden; }
    .ai-image img { width: 100%; height: 100%; object-fit: cover; }
    .chat-box { background: rgba(0, 0, 0, 0.5); border: 1px solid #00ffff44; border-radius: 10px; width: 100%; height: 250px; overflow-y: auto; padding: 15px; margin-bottom: 15px; font-family: sans-serif; }
    .chat-entry { margin-bottom: 10px; padding: 8px; border-radius: 8px; font-size: 0.9rem; }
    .user { background: #00ffff22; color: #fff; text-align: right; border-right: 3px solid #00ffff; }
    .ai { background: #00444444; color: #00ffff; border-left: 3px solid #00ffff; }
    .mic-btn { background: linear-gradient(135deg, #00ffff, #008888); border: none; padding: 12px 30px; border-radius: 25px; color: #000; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
    .status { font-size: 0.7rem; color: #00ffffaa; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="status" id="statusText">READY</div>
    <div class="ai-image">
      <img src="https://i.imgur.com/your-image-link.jpg" alt="Samaya" /> </div>
    <h2 style="margin: 5px 0;">SAMAYA</h2>
    <div class="chat-box" id="chatBox"></div>
    <button class="mic-btn" id="micBtn">🎙️ SPEAK</button>
  </div>

  <script>
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0"; // Tapai ko key
    const chatBox = document.getElementById('chatBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = `chat-entry ${type}`;
      div.innerText = (type === 'user' ? "You: " : "Samaya: ") + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // AI Response Function (Google Gemini)
    async function askGemini(question) {
      statusText.innerText = "THINKING...";
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: question + " (Please answer in the language I used, either Nepali or English)" }] }]
          })
        });

        const data = await response.json();
        
        if (data.error) {
           return "API Error: " + data.error.message;
        }
        
        return data.candidates[0].content.parts[0].text;
      } catch (err) {
        return "Connection failed. Please check your internet.";
      }
    }

    // Voice Synthesis (Speaking)
    function speak(text) {
      const synth = window.speechSynthesis;
      const utter = new SpeechSynthesisUtterance(text);
      // Nepali voice detect garna khojne, natra default
      const voices = synth.getVoices();
      utter.voice = voices.find(v => v.lang.includes('ne') || v.lang.includes('hi')) || voices[0];
      synth.speak(utter);
    }

    // Speech Recognition
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
      const rec = new Recognition();
      rec.lang = 'ne-NP'; // Nepali primary

      micBtn.onclick = () => { rec.start(); statusText.innerText = "LISTENING..."; };

      rec.onresult = async (event) => {
        const query = event.results[0][0].transcript;
        addChat(query, 'user');
        
        const answer = await askGemini(query);
        addChat(answer, 'ai');
        speak(answer);
        statusText.innerText = "READY";
      };
    } else {
      statusText.innerText = "SPEECH NOT SUPPORTED";
    }
    async function askGemini(question) {
  statusText.innerText = "🤔 SAMAYA IS THINKING...";
  
  // System Instruction: Samaya lai kasto hune vanera sikaine
  const prompt = `You are Samaya, a friendly and intelligent AI assistant. 
                  Always answer in a conversational and helpful tone. 
                  If the user speaks in Nepali, reply in Nepali. 
                  User Question: ${question}`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });

    const data = await response.json();
    
    if (data.candidates && data.candidates[0].content) {
       return data.candidates[0].content.parts[0].text;
    } else {
       return "Hmm, maile tyo bujhina. K feri vanna saknu hunchha?";
    }
  } catch (err) {
    return "Internet ma samasya bhayeko jasto chha. Kripaya check garnu hos!";
  }
}
  </script>
</body>
</html>
