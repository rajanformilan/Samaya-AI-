<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>Samaya AI - Personal Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #00020a; color: #00f0f0;
      font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; height: 100vh; overflow: hidden;
    }
    .container {
      background: rgba(0, 255, 255, 0.05); border: 2px solid #00ffff88;
      border-radius: 20px; width: 95vw; max-width: 500px; padding: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3); display: flex; flex-direction: column; align-items: center;
    }
    .ai-circle {
      width: 160px; height: 160px; border-radius: 50%; border: 3px solid #00ffff;
      box-shadow: 0 0 20px #00ffff; overflow: hidden; margin-bottom: 10px;
    }
    .ai-circle img { width: 100%; height: 100%; object-fit: cover; }
    .chat-box {
      background: rgba(0, 0, 0, 0.7); border: 1px solid #00ffff44; border-radius: 12px;
      width: 100%; height: 280px; overflow-y: auto; padding: 15px; margin: 15px 0;
      font-family: sans-serif; font-size: 0.95rem;
    }
    .chat-entry { margin-bottom: 12px; padding: 10px; border-radius: 8px; }
    .user { background: rgba(0, 255, 255, 0.1); color: #fff; text-align: right; border-right: 4px solid #00ffff; }
    .ai { background: rgba(0, 255, 255, 0.05); color: #00ffff; border-left: 4px solid #00ffff; }
    .mic-btn {
      background: linear-gradient(135deg, #00ffff, #008888); border: none;
      padding: 15px 45px; border-radius: 50px; font-size: 1.3rem; cursor: pointer;
      color: #000; font-weight: bold; font-family: 'Orbitron'; box-shadow: 0 0 20px #00ffff;
    }
    .status { font-size: 0.7rem; color: #00ffffaa; margin-bottom: 5px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="container">
    <div class="status" id="statusText">System Ready</div>
    <div class="ai-circle">
       <img src="https://i.imgur.com/zV8A56X.png" alt="Samaya AI">
    </div>
    <h2 style="margin: 5px 0; letter-spacing: 3px;">SAMAYA</h2>
    <div class="chat-box" id="chatBox"></div>
    <button class="mic-btn" id="micBtn">🎙️ SPEAK</button>
  </div>

  <script>
    // Tapai ko original API key
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0";
    const chatBox = document.getElementById('chatBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = `chat-entry ${type}`;
      div.innerText = (type === 'user' ? "You: " : "Samaya: ") + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function getAIResponse(query) {
      statusText.innerText = "Thinking...";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
      
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Samaya, a brilliant scientist AI. The user is a genius inventor. Give detailed, genuinely helpful answers like ChatGPT. If asked about NASA, provide deep career and scientific advice. Respond in Nepali if the user speaks Nepali. User: ${query}` }] }]
          })
        });

        const data = await response.json();
        if(data.error) return "API Error: " + data.error.message;
        return data.candidates[0].content.parts[0].text;
      } catch (e) {
        return "Connection failed! Internet check garnu hos.";
      }
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ne-NP';
      window.speechSynthesis.speak(utter);
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
      const rec = new Recognition();
      rec.lang = 'ne-NP';

      micBtn.onclick = () => { rec.start(); statusText.innerText = "Listening..."; };

      rec.onresult = async (e) => {
        const query = e.results[0][0].transcript;
        addChat(query, 'user');
        const answer = await getAIResponse(query);
        addChat(answer, 'ai');
        speak(answer);
        statusText.innerText = "Ready";
      };
    }
  </script>
</body>
</html>
