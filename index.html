<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>Samaya AI - Personal Scientist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #00050a; color: #00f0f0;
      font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; height: 100vh; overflow: hidden;
    }
    .container {
      background: rgba(0, 255, 255, 0.05); border: 2px solid #00ffff55;
      border-radius: 20px; width: 95vw; max-width: 500px; padding: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); display: flex; flex-direction: column; align-items: center;
    }
    .chat-box {
      background: rgba(0, 0, 0, 0.8); border: 1px solid #00ffff33; border-radius: 12px;
      width: 100%; height: 320px; overflow-y: auto; padding: 15px; margin: 15px 0;
      font-family: sans-serif; font-size: 1rem; color: #fff; line-height: 1.6;
    }
    .chat-entry { margin-bottom: 12px; padding: 10px; border-radius: 8px; border-left: 4px solid #00ffff; }
    .user { background: rgba(0, 255, 255, 0.15); text-align: right; border-left: none; border-right: 4px solid #00ffff; }
    .ai { background: rgba(0, 255, 255, 0.05); color: #00f0f0; }
    .mic-btn {
      background: linear-gradient(135deg, #00ffff, #008888); border: none;
      padding: 15px 55px; border-radius: 50px; font-size: 1.4rem; cursor: pointer;
      color: #000; font-weight: bold; font-family: 'Orbitron'; box-shadow: 0 0 25px #00ffff;
    }
    .status { font-size: 0.8rem; color: #00ffffaa; margin-bottom: 5px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="status" id="statusText">SYSTEM READY</div>
    <h1 style="letter-spacing: 5px; margin: 10px 0;">SAMAYA</h1>
    <div class="chat-box" id="chatBox">
      <div class="chat-entry ai">Ma maafi chahanchhu! Aba maile mero brain connect gareko chhu. Aba ma NASA ra Science ko barema Google bata khojera ChatGPT jastai detailed answer dinechhu. SPEAK thichnu hos!</div>
    </div>
    <button class="mic-btn" id="micBtn">🎙️ SPEAK</button>
  </div>

  <script>
    // TAPAI KO API KEY
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0"; 
    const chatBox = document.getElementById('chatBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = `chat-entry ${type}`;
      div.innerText = (type === 'user' ? "You: " : "Samaya: ") + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function getAIResponse(query) {
      statusText.innerText = "GOOGLE READING...";
      // CORRECTED URL: Ensuring the model name is exactly what Google expects
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
      
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Samaya, an expert AI scientist with access to Google's knowledge. Give very long, detailed, and point-wise answers like ChatGPT. Use Nepali if asked in Nepali. Question: ${query}` }] }]
          })
        });

        const data = await response.json();
        if (data.candidates && data.candidates[0].content) {
          return data.candidates[0].content.parts[0].text;
        } else {
          console.log(data); // Log for debugging
          return "Pardun! Mero brain connection ma ali samasya aayo. Feri prayas garnu hos.";
        }
      } catch (e) {
        return "Connection failed! Internet check garnu hos.";
      }
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
      const rec = new Recognition();
      rec.lang = 'ne-NP';

      micBtn.onclick = () => { 
        window.speechSynthesis.cancel();
        rec.start(); 
        statusText.innerText = "LISTENING..."; 
      };

      rec.onresult = async (e) => {
        const query = e.results[0][0].transcript;
        addChat(query, 'user');
        const answer = await getAIResponse(query);
        addChat(answer, 'ai');
        
        // Voice Output (Google Reading Voice)
        const utter = new SpeechSynthesisUtterance(answer);
        utter.lang = 'ne-NP';
        utter.rate = 0.9; // Ali bistarai bolne gari
        window.speechSynthesis.speak(utter);
        statusText.innerText = "ONLINE";
      };
    }
  </script>
</body>
</html>
