<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>Samaya - Ultra Intelligent AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0; background: radial-gradient(circle at center, #000a1a, #000014);
      color: #00f0f0; font-family: 'Orbitron', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .container {
      background: rgba(0, 255, 255, 0.05); border: 2px solid #00ffff88;
      border-radius: 20px; width: 95vw; max-width: 600px; padding: 25px;
      box-shadow: 0 0 40px #00ffff66; display: flex; flex-direction: column; align-items: center;
    }
    .ai-image {
      width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00ffff;
      box-shadow: 0 0 30px #00ffff; overflow: hidden; animation: pulse 2s infinite;
    }
    .ai-image img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .chat-box {
      background: rgba(0, 0, 0, 0.6); border: 1px solid #00ffff44; border-radius: 12px;
      width: 100%; height: 300px; overflow-y: auto; padding: 15px; margin: 20px 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .chat-entry { margin-bottom: 15px; padding: 10px; border-radius: 8px; line-height: 1.5; }
    .user { background: rgba(0, 255, 255, 0.15); color: #fff; border-right: 4px solid #00ffff; text-align: right; }
    .ai { background: rgba(0, 50, 50, 0.5); color: #00ffff; border-left: 4px solid #00ffff; }
    .mic-btn {
      background: linear-gradient(135deg, #00ffff, #008888); border: none;
      padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer;
      color: #000; font-weight: bold; font-family: 'Orbitron'; box-shadow: 0 0 20px #00ffff;
    }
    .status { font-size: 0.8rem; color: #00ffffaa; margin-bottom: 10px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="status" id="statusText">SYSTEM ONLINE</div>
    <div class="ai-image">
      <img src="https://i.imgur.com/zV8A56X.png" alt="Samaya AI" />
    </div>
    <h2 style="letter-spacing: 5px; margin: 10px 0;">SAMAYA</h2>
    <div class="chat-box" id="chatBox">
        <div class="chat-entry ai">Namaste! Ma Samaya hu. Ma NASA, Science, ya kunai pani bisaya ma tapai lai ChatGPT jastai help garna sakchhu. Bolna ko lagi 'SPEAK' thichnu hos.</div>
    </div>
    <button class="mic-btn" id="micBtn">🎙️ SPEAK</button>
  </div>

  <script>
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0";
    const chatBox = document.getElementById('chatBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');

    // Speech Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ne-NP'; 

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = `chat-entry ${type}`;
      div.innerText = (type === 'user' ? "You: " : "Samaya: ") + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Direct Gemini API Call (ChatGPT Mode)
    async function getAIResponse(query) {
      statusText.innerText = "THINKING...";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
      
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Samaya, an advanced AI like ChatGPT. Answer everything in detail. If asked in Nepali, reply in Nepali. Question: ${query}` }] }]
          })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
      } catch (e) {
        return "Connection Error! Kripaya internet check garnu hos.";
      }
    }

    function speak(text) {
      window.speechSynthesis.cancel(); // Stop previous voice
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ne-NP';
      window.speechSynthesis.speak(utter);
    }

    micBtn.onclick = () => {
      recognition.start();
      statusText.innerText = "LISTENING...";
    };

    recognition.onresult = async (event) => {
      const query = event.results[0][0].transcript;
      addChat(query, 'user');
      const answer = await getAIResponse(query);
      addChat(answer, 'ai');
      speak(answer);
      statusText.innerText = "SYSTEM ONLINE";
    };
  </script>
</body>
</html>
