<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samaya Smart AI</title>
  <style>
    body { background: #000; color: #00f0f0; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #chat { width: 90%; max-width: 400px; height: 300px; border: 1px solid #00ffff; overflow-y: auto; padding: 10px; margin-bottom: 20px; text-align: left; background: rgba(0,255,255,0.05); }
    button { background: #00ffff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h1>SAMAYA AI</h1>
  <div id="chat">Samaya: Namaste! Aba ma sanchikai bolchhu. Sodhnu hos!</div>
  <button id="btn">🎙️ SPEAK</button>

  <script>
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0"; 
    const btn = document.getElementById('btn');
    const chat = document.getElementById('chat');

    async function askAI(query) {
      chat.innerHTML += `<p style="color:#fff">You: ${query}</p>`;
      // FIXED ENDPOINT: v1beta models/gemini-1.5-flash
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
      
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: "Explain in detail like a scientist in Nepali: " + query }] }] })
        });
        const data = await res.json();
        const reply = data.candidates[0].content.parts[0].text;
        chat.innerHTML += `<p>Samaya: ${reply}</p>`;
        chat.scrollTop = chat.scrollHeight;
        
        // Voice
        const speech = new SpeechSynthesisUtterance(reply);
        speech.lang = 'ne-NP';
        window.speechSynthesis.speak(speech);
      } catch (e) {
        chat.innerHTML += `<p style="color:red">Error: URL ya Key mileko chhaina.</p>`;
      }
    }

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'ne-NP';
    btn.onclick = () => { rec.start(); chat.innerHTML += `<p><i>Sundaichhu...</i></p>`; };
    rec.onresult = (e) => askAI(e.results[0][0].transcript);
  </script>
</body>
</html>
