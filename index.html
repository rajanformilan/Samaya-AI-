<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <title>Samaya AI - Final Fixed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
    body { margin: 0; background: #000814; color: #00f0f0; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { background: rgba(0, 255, 255, 0.05); border: 2px solid #00ffff55; border-radius: 20px; width: 95vw; max-width: 500px; padding: 20px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); text-align: center; }
    .chat-box { background: rgba(0, 0, 0, 0.8); border: 1px solid #00ffff33; border-radius: 12px; height: 350px; overflow-y: auto; padding: 15px; margin: 15px 0; font-family: sans-serif; text-align: left; line-height: 1.6; }
    .chat-entry { margin-bottom: 12px; padding: 10px; border-radius: 8px; border-left: 4px solid #00ffff; }
    .user { background: rgba(0, 255, 255, 0.15); text-align: right; border-left: none; border-right: 4px solid #00ffff; color: #fff; }
    .ai { background: rgba(0, 255, 255, 0.05); color: #00f0f0; }
    .mic-btn { background: linear-gradient(135deg, #00ffff, #008888); border: none; padding: 15px 55px; border-radius: 50px; font-size: 1.4rem; cursor: pointer; color: #000; font-weight: bold; font-family: 'Orbitron'; box-shadow: 0 0 25px #00ffff; }
    .status { font-size: 0.8rem; color: #00ffffaa; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="status" id="statusText">ONLINE - NO ERRORS</div>
    <h1 style="letter-spacing: 5px;">SAMAYA</h1>
    <div class="chat-box" id="chatBox">
      <div class="chat-entry ai">Maafi chahanchhu! Aba ma sanchikai tayar chhu. Malai NASA, Science ya kunai pani kura sodhnu hos, ma ChatGPT jastai detailed answer dinechhu.</div>
    </div>
    <button class="mic-btn" id="micBtn">🎙️ SPEAK</button>
  </div>

  <script>
    const API_KEY = "AIzaSyBD9IYBlVVC3T7cmWHK0gJyJQOW-DW88m0"; 
    const chatBox = document.getElementById('chatBox');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');

    function addChat(text, type) {
      const div = document.createElement('div');
      div.className = `chat-entry ${type}`;
      div.innerText = (type === 'user' ? "You: " : "Samaya: ") + text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function getAIResponse(query) {
      statusText.innerText = "THINKING...";
      // STABLE MODEL: Using gemini-pro instead of flash to fix the error
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;
      
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Samaya, an expert scientist AI. Give very long, intelligent, and point-wise answers like ChatGPT. Use Nepali if asked in Nepali. Question: ${query}` }] }]
          })
        });

        const data = await response.json();
        if (data.candidates && data.candidates[0].content) {
          return data.candidates[0].content.parts[0].text;
        } else {
          return "API Response Error. Check Key configuration.";
        }
      } catch (e) {
        return "Connection failed! Internet check garnu hos.";
      }
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
      const rec = new Recognition();
      rec.lang = 'ne-NP';

      micBtn.onclick = () => { 
        window.speechSynthesis.cancel();
        rec.start(); 
        statusText.innerText = "LISTENING..."; 
      };

      rec.onresult = async (e) => {
        const query = e.results[0][0].transcript;
        addChat(query, 'user');
        const answer = await getAIResponse(query);
        addChat(answer, 'ai');
        
        const utter = new SpeechSynthesisUtterance(answer);
        utter.lang = 'ne-NP';
        window.speechSynthesis.speak(utter);
        statusText.innerText = "ONLINE";
      };
    }
  </script>
</body>
</html>
